<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Instagram キャプション生成 | Est!prossimo</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', sans-serif; background: #faf9f7; color: #1a1a1a; }
  .container { max-width: 480px; margin: 0 auto; padding: 1.5rem 1rem 4rem; }
  .header { display: flex; align-items: center; gap: 12px; margin-bottom: 2rem; padding-bottom: 1rem; border-bottom: 1px solid #e8e4de; }
  .logo { width: 44px; height: 44px; border-radius: 50%; background: #d4a843; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; color: #fff; flex-shrink: 0; letter-spacing: 0.05em; }
  .header-text h1 { font-size: 16px; font-weight: 600; color: #1a1a1a; }
  .header-text p { font-size: 12px; color: #888; margin-top: 2px; }
  .section { margin-bottom: 1.25rem; }
  label { display: block; font-size: 13px; color: #666; margin-bottom: 6px; font-weight: 500; }
  input[type="text"], textarea {
    width: 100%; padding: 11px 13px;
    border: 1px solid #ddd; border-radius: 10px;
    background: #fff; color: #1a1a1a;
    font-size: 15px; font-family: inherit;
    outline: none; transition: border-color 0.15s;
  }
  input[type="text"]:focus, textarea:focus { border-color: #d4a843; }
  textarea { resize: none; height: 76px; line-height: 1.5; }
  .apikey-area { background: #fff8ed; border: 1px solid #f0d080; border-radius: 10px; padding: 12px; margin-bottom: 1.5rem; }
  .apikey-area label { color: #8a6800; margin-bottom: 6px; }
  .apikey-area input { border-color: #f0d080; background: #fff; font-size: 13px; font-family: monospace; }
  .apikey-note { font-size: 11px; color: #a07820; margin-top: 5px; }
  .upload-area {
    border: 1.5px dashed #ddd; border-radius: 10px;
    padding: 1.5rem; text-align: center; cursor: pointer;
    background: #fff; position: relative;
  }
  .upload-area input { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
  .upload-icon { font-size: 28px; margin-bottom: 6px; }
  .upload-text { font-size: 13px; color: #999; }
  #preview-img { width: 100%; border-radius: 10px; margin-top: 10px; display: none; max-height: 220px; object-fit: cover; }
  .tone-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
  .tone-btn {
    padding: 10px 8px; border: 1px solid #ddd; border-radius: 10px;
    background: #fff; color: #666; font-size: 13px; cursor: pointer;
    text-align: center; font-family: inherit;
  }
  .tone-btn.active { border-color: #d4a843; color: #7a5c00; background: #fdf6e3; font-weight: 600; }
  .gen-btn {
    width: 100%; padding: 14px; background: #d4a843; color: #fff; border: none;
    border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer;
    margin-top: 0.5rem; font-family: inherit;
  }
  .gen-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .error-msg { font-size: 13px; color: #c0392b; margin-top: 8px; text-align: center; min-height: 20px; }
  .result-area { margin-top: 1.5rem; display: none; }
  .variation-tabs { display: flex; gap: 6px; margin-bottom: 10px; }
  .var-tab {
    padding: 6px 14px; border: 1px solid #ddd; border-radius: 99px;
    background: #fff; color: #888; font-size: 12px; cursor: pointer; font-family: inherit;
  }
  .var-tab.active { border-color: #d4a843; color: #7a5c00; background: #fdf6e3; font-weight: 600; }
  .result-card {
    background: #fff; border: 1px solid #e8e4de; border-radius: 12px;
    padding: 1rem 1.125rem; margin-bottom: 10px;
  }
  .result-label { font-size: 10px; color: #bbb; margin-bottom: 8px; letter-spacing: 0.1em; font-weight: 600; }
  .result-text { font-size: 14px; color: #1a1a1a; line-height: 1.8; white-space: pre-wrap; }
  .action-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .copy-btn, .insta-btn {
    padding: 11px; border-radius: 10px; font-size: 13px; cursor: pointer;
    text-align: center; font-family: inherit; font-weight: 500; text-decoration: none;
    display: block;
  }
  .copy-btn { background: #f0ece4; color: #555; border: none; }
  .insta-btn { background: #d4a843; color: #fff; border: none; }
  .footer { margin-top: 2rem; text-align: center; font-size: 11px; color: #ccc; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="logo">EST</div>
    <div class="header-text">
      <h1>Instagram キャプション生成</h1>
      <p>Est!prossimo 専用ツール</p>
    </div>
  </div>

  <div class="apikey-area">
    <label>Anthropic APIキー</label>
    <input type="password" id="api-key" placeholder="sk-ant-..." autocomplete="off">
    <div class="apikey-note">※ キーはこのブラウザ内のみで使用されます</div>
  </div>

  <div class="section">
    <label>料理の写真（任意）</label>
    <div class="upload-area">
      <input type="file" accept="image/*" id="photo-input" onchange="handlePhoto(this)">
      <div class="upload-icon">📷</div>
      <div class="upload-text" id="upload-text">タップして写真を選択</div>
    </div>
    <img id="preview-img" alt="プレビュー">
  </div>

  <div class="section">
    <label>料理名</label>
    <input type="text" id="dish-name" placeholder="例：房総鯵のカルパッチョ" maxlength="80">
  </div>

  <div class="section">
    <label>一言メモ（任意）</label>
    <textarea id="memo" placeholder="例：今日だけの日替わり、旬のアジ使用、ランチ限定 など"></textarea>
  </div>

  <div class="section">
    <label>トーン</label>
    <div class="tone-grid">
      <button class="tone-btn active" onclick="selectTone(this,'casual')">カジュアル</button>
      <button class="tone-btn" onclick="selectTone(this,'elegant')">上品・丁寧</button>
      <button class="tone-btn" onclick="selectTone(this,'hungry')">食欲そそる</button>
      <button class="tone-btn" onclick="selectTone(this,'story')">ストーリー風</button>
    </div>
  </div>

  <button class="gen-btn" id="gen-btn" onclick="generateCaption()">キャプションを生成する</button>
  <div class="error-msg" id="error-msg"></div>

  <div class="result-area" id="result-area">
    <div class="variation-tabs" id="var-tabs"></div>
    <div class="result-card">
      <div class="result-label">CAPTION</div>
      <div class="result-text" id="result-text"></div>
    </div>
    <div class="action-row">
      <button class="copy-btn" onclick="copyCaption()">コピーする</button>
      <a class="insta-btn" href="https://www.instagram.com/est.prossimo/" target="_blank">Instagramを開く</a>
    </div>
  </div>

  <div class="footer">Powered by Claude API · Est!prossimo</div>
</div>

<script>
const PROXY_URL = 'https://caption-proxy.boston1215.workers.dev/';

let selectedTone = 'casual';
let photoBase64 = null;
let photoMediaType = 'image/jpeg';
let variations = [];

const tonePrompts = {
  casual: '親しみやすくフレンドリーなトーンで。絵文字を2〜3個使い、軽やかに。',
  elegant: '上品で丁寧なトーンで。絵文字は控えめに1〜2個。落ち着いた言葉選びで。',
  hungry: '食欲をそそる表現をたっぷり使って。香り・食感・見た目を具体的に描写して。絵文字3〜4個。',
  story: 'その料理が生まれるまでの背景や食材のストーリーを交えて。詩的でリズムのある文体で。'
};
const toneLabels = { casual:'カジュアル', elegant:'上品・丁寧', hungry:'食欲そそる', story:'ストーリー風' };

function handlePhoto(input) {
  const file = input.files[0];
  if (!file) return;
  photoMediaType = file.type || 'image/jpeg';
  const reader = new FileReader();
  reader.onload = e => {
    photoBase64 = e.target.result.split(',')[1];
    const img = document.getElementById('preview-img');
    img.src = e.target.result;
    img.style.display = 'block';
    document.getElementById('upload-text').textContent = '写真を変更する';
  };
  reader.readAsDataURL(file);
}

function selectTone(btn, tone) {
  document.querySelectorAll('.tone-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  selectedTone = tone;
}

async function generateCaption() {
  const apiKey = document.getElementById('api-key').value.trim();
  const dishName = document.getElementById('dish-name').value.trim();
  const memo = document.getElementById('memo').value.trim();
  const errEl = document.getElementById('error-msg');
  errEl.textContent = '';

  if (!apiKey) { errEl.textContent = 'APIキーを入力してください'; return; }
  if (!dishName) { errEl.textContent = '料理名を入力してください'; return; }

  const btn = document.getElementById('gen-btn');
  btn.disabled = true;
  btn.textContent = '生成中…';
  document.getElementById('result-area').style.display = 'none';

  const systemPrompt = `あなたはEst!prossimo（エスト！プロッシモ）というイタリアンレストランのInstagramキャプションを書く専門家です。

お店について：
- 千葉駅近く（創業29年）の人気イタリアン
- 「千産千消」がテーマ：房総・千葉の新鮮な地元食材を使用
- 契約農家から直送の野菜、旬の魚介・肉
- グラスワインは常時20種以上、ソムリエが選定
- 1F：気軽なオステリア＆バー　2F：トラットリア
- 食べログ「イタリアンEAST百名店2025」選出
- 温かく活気ある雰囲気

キャプションのルール：
- 150〜200文字程度
- ハッシュタグは必ず最後にまとめて5〜8個
- 必ず「#エストプロッシモ」「#千産千消」「#千葉グルメ」を含める
- 投稿日時・予約案内は含めない
- 日本語のみ

${tonePrompts[selectedTone]}

3パターンのキャプションを生成してください。
必ずこの形式でJSONのみ返してください（マークダウン不要）：
{"captions":["パターン1","パターン2","パターン3"]}`;

  const userContent = [];
  if (photoBase64) {
    userContent.push({ type: 'image', source: { type: 'base64', media_type: photoMediaType, data: photoBase64 } });
  }
  userContent.push({
    type: 'text',
    text: `料理名：${dishName}${memo ? '\n補足：' + memo : ''}\nトーン：${toneLabels[selectedTone]}`
  });

  try {
    const res = await fetch(PROXY_URL, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
      },
      body: JSON.stringify({
        model: 'claude-opus-4-6',
        max_tokens: 1000,
        system: systemPrompt,
        messages: [{ role: 'user', content: userContent }]
      })
    });

    if (!res.ok) {
      const errData = await res.json().catch(() => ({}));
      throw new Error(errData.error?.message || `HTTPエラー ${res.status}`);
    }

    const data = await res.json();
    const text = data.content.map(b => b.text || '').join('');
    const clean = text.replace(/```json|```/g, '').trim();
    const parsed = JSON.parse(clean);
    variations = parsed.captions || [];
    showVariation(0);
    document.getElementById('result-area').style.display = 'block';
    document.getElementById('result-area').scrollIntoView({ behavior: 'smooth' });
  } catch(e) {
    errEl.textContent = 'エラー：' + e.message;
  }

  btn.disabled = false;
  btn.textContent = 'キャプションを生成する';
}

function showVariation(idx) {
  document.getElementById('result-text').textContent = variations[idx] || '';
  const tabsEl = document.getElementById('var-tabs');
  tabsEl.innerHTML = variations.map((_, i) =>
    `<button class="var-tab ${i === idx ? 'active' : ''}" onclick="showVariation(${i})">パターン ${i+1}</button>`
  ).join('');
}

function copyCaption() {
  const text = document.getElementById('result-text').textContent;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.querySelector('.copy-btn');
    btn.textContent = 'コピーしました！';
    setTimeout(() => btn.textContent = 'コピーする', 2000);
  });
}
</script>
</body>
</html>
